<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grocerytab</title>
<style>
  body { margin:0; background:#0C130C; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:560px; padding:48px 24px; text-align:center; }
  h1 { font-size:2.4rem; margin-bottom:0.5rem; color:#4A8A4E; }
  p.tag { font-size:1.15rem; color:#cfcfcf; margin-bottom:2rem; }
  .badge { display:inline-block; padding:10px 22px; border:1px solid #4A8A4E; color:#4A8A4E; border-radius:24px; font-weight:600; }
  footer { margin-top:3rem; font-size:0.85rem; color:#888; }
  a { color:#4A8A4E; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4A8A4E55 0%, #4A8A4E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Grocerytab</h1>
  <p class="tag">Keep a running tab of grocery spending so you never overshoot budget mid-aisle.</p>
  <div class="badge">Coming soon on the App Store</div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
