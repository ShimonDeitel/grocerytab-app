name: Grocerytab
options:
  bundleIdPrefix: com.shimondeitel.grocerytab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Grocerytab:
    type: application
    platform: iOS
    sources:
      - path: Grocerytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerytab
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Grocerytab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GrocerytabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrocerytabTests
      - path: Grocerytab.storekit
    dependencies:
      - target: Grocerytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerytab.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GrocerytabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GrocerytabUITests
    dependencies:
      - target: Grocerytab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerytab.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Grocerytab:
    build:
      targets:
        Grocerytab: all
        GrocerytabTests: [test]
        GrocerytabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Grocerytab.storekit
    test:
      config: Debug
      storeKitConfiguration: Grocerytab.storekit
      targets:
        - GrocerytabTests
        - GrocerytabUITests
    archive:
      config: Release
